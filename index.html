<!DOCTYPE html>
<html>
<head>
  <title>Portfolio</title>
  <style>
    body {
      font-family: Arial;
      background-color: #111;
      color: white;
      margin: 0;
    }

    header {
      background-color: #222;
      padding: 15px;
      text-align: center;
    }

    nav a {
      margin: 5px;
      color: white;
      text-decoration: none;
      cursor: pointer;
    }

    section {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    img {
      width: 50%;
      display: block;
      margin: 10px auto;
    }

    .card {
      border: 1px solid gray;
      padding: 10px;
      margin: 10px 0;
    }

    input, textarea {
      width: 100%;
      margin: 5px 0;
    }

    button {
      margin-top: 10px;
    }
    footer {
      text-align: center;
      padding: 10px;
      background-color: #222;
      color: gray;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h2>MY PORTFOLIO</h2>
  <p>JOSHUA D. CASTILLO</p>

  <nav>
    <a onclick="show('home')">Home</a>
    <a onclick="show('about')">About</a>
    <a onclick="show('outputs')">Outputs</a>
    <a onclick="show('quiz')">Quiz</a>
    <a onclick="show('lab')">Lab</a>
    <a onclick="show('exam')">Exam</a>
  </nav>
</header>


<section id="home" class="active">
  <h3>Home</h3>
  <img src="IMG_0868.jpeg">

  <p>Hello, I am Joshua. This is my portfolio for ITEC50</p>

</section>


<section id="about">
  <h3>About</h3>
  <p>I like watching movies and playing games.</p>
</section>


<section id="outputs">
  <h3>Outputs</h3>

  <div class="card">
    <p>Quiz 1</p>
    <img src="WALLY.jpg">
  </div>

  <div class="card">
    <p>Quiz 2</p>
    <img src="WALLY.jpg">
  </div>
  
  <div class="card">
    <p>Quiz 3</p>
    <img src="WALLY.jpg">
  </div>
</section>


<section id="quiz">
  <h3>Quiz Upload</h3>

  <form onsubmit="alert('Uploaded')">
    <input type="text" placeholder="Title" required>
    <input type="file" required>
    <input type="file" required>
    <button type="submit">Submit</button>
  </form>
</section>


<section id="lab">
  <h3>Lab Upload</h3>

  <form onsubmit="alert('Uploaded')">
    <textarea placeholder="Description"></textarea>
    <input type="file">
    <input type="file">
    <button type="submit">Submit</button>
  </form>
</section>


<section id="exam">
  <h3>Exam Upload</h3>

  <form onsubmit="alert('Uploaded')">
    <input type="text" placeholder="Title">
    <input type="file">
    <input type="file">
    <button type="submit">Submit</button>
  </form>
</section>

<script>
function show(id) {
  let sections = document.querySelectorAll("section");
  sections.forEach(s => s.style.display = "none");

  document.getElementById(id).style.display = "block";
}
</script>
<footer>
  <p>joshua.castillo@cvsu.edu.ph</p>
</footer>
</body>
</html>
